<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="./assets/js/dark-mode.js"></script>
  <title>Entrar | MatchMyPet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="./assets/css/login.css">
  <link rel="stylesheet" href="./assets/css/dark-mode.css">
  <link rel="stylesheet" href="./assets/css/responsive.css">
  <link rel="stylesheet" href="./assets/css/toast.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</head>

<body>
  <div id="login" class="pagina-login">
    <div class="login-container">
      <div class="login-card">
        <div class="login-marca">
          <a href="./about.html" class="login-marca-link">
            <span class="login-marca-icone">♥</span>
            <span class="login-marca-texto">MatchMyPet</span>
          </a>
          <p class="login-marca-subtitulo">Conecte-se para encontrar o pet perfeito</p>
        </div>

        <div id="login-box">
          <form id="login-form" method="post">
            <h2 class="login-titulo">Identificação de Usuário</h2>

            <div class="campo-grupo">
              <label for="username">Login</label>
              <input type="text" name="username" id="username" placeholder="Digite seu usuário" required>
            </div>

            <div class="campo-grupo">
              <label for="password">Senha</label>
              <input type="password" name="password" id="password" placeholder="Digite sua senha" required>
            </div>

            <div class="login-lembrar">
              <label class="checkbox-lembrar" for="lembrar-senha">
                <input type="checkbox" id="lembrar-senha" name="lembrar">
                <span>Lembrar senha</span>
              </label>
            </div>

            <div class="login-acoes">
              <input type="submit" name="submit" class="btn-login" value="Entrar" id="btn-login">
              <span class="login-divisor">ou</span>
              <button type="button" class="btn-registrar" data-bs-toggle="modal" data-bs-target="#loginModal">
                Criar nova conta
              </button>
            </div>
          </form>
        </div>

        <a href="./about.html" class="login-voltar">← Voltar para o início</a>
      </div>
    </div>
  </div>

  <!-- Modal de registro -->
  <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="loginModalLabel">Criar conta no MatchMyPet</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <div id="register-box">
            <form id="register-form" method="post">
              <p class="login-titulo">Preencha seus dados para se cadastrar</p>

              <div class="campo-grupo">
                <label for="txt_login">Usuário</label>
                <input type="text" name="txt_login" id="txt_login" placeholder="Escolha um nome de usuário">
              </div>

              <div class="campo-grupo">
                <label for="txt_nome">Nome completo</label>
                <input type="text" name="txt_nome" id="txt_nome" placeholder="Seu nome completo">
              </div>

              <div class="campo-grupo">
                <label for="txt_email">E-mail</label>
                <input type="email" name="txt_email" id="txt_email" placeholder="seu@email.com">
              </div>

              <div class="campo-grupo">
                <label for="txt_senha">Senha</label>
                <input type="password" name="txt_senha" id="txt_senha" placeholder="Crie uma senha">
              </div>

              <div class="campo-grupo">
                <label for="txt_senha2">Confirmação de senha</label>
                <input type="password" name="txt_senha2" id="txt_senha2" placeholder="Repita a senha">
              </div>
            </form>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="btn_salvar" class="btn btn-salvar">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./assets/js/toast.js"></script>
  <script src="./assets/js/login.js"></script>
  <script>

    function salvarCredenciais(username, password, lembrar) {
      if (lembrar) {
        localStorage.setItem('lembrarSenha', 'true');
        localStorage.setItem('loginSalvo', username);
        localStorage.setItem('senhaSalva', password);
      } else {
        localStorage.removeItem('lembrarSenha');
        localStorage.removeItem('loginSalvo');
        localStorage.removeItem('senhaSalva');
      }
    }

    function carregarCredenciaisSalvas() {
      if (localStorage.getItem('lembrarSenha') !== 'true') return;

      document.getElementById('lembrar-senha').checked = true;
      document.getElementById('username').value = localStorage.getItem('loginSalvo') || '';
      document.getElementById('password').value = localStorage.getItem('senhaSalva') || '';
    }

    function processaFormLogin(event) {
      event.preventDefault();

      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;
      var lembrar = document.getElementById('lembrar-senha').checked;

      resultadoLogin = loginUser(username, password);
      if (resultadoLogin) {
        salvarCredenciais(username, password, lembrar);
        window.location.href = RETURN_URL;
      }
      else if (!Array.isArray(db_usuarios) || db_usuarios.length === 0) {
        showToast('Aguarde o carregamento dos usuários e tente novamente.', 'info');
      }
      else {
        showToast('Usuário ou senha incorretos', 'erro');
      }
    }

    function salvaLogin(event) {
      event.preventDefault();

      let login = document.getElementById('txt_login').value;
      let nome = document.getElementById('txt_nome').value;
      let email = document.getElementById('txt_email').value;
      let senha = document.getElementById('txt_senha').value;
      let senha2 = document.getElementById('txt_senha2').value;
      if (senha != senha2) {
        showToast('As senhas informadas não conferem.', 'erro');
        return
      }

      addUser(nome, login, senha, email);
      showToast('Usuário salvo com sucesso. Proceda com o login.', 'sucesso');

      const modalEl = document.getElementById('loginModal');
      const modal = bootstrap.Modal.getInstance(modalEl);
      if (modal) modal.hide();
    }

    document.getElementById('login-form').addEventListener('submit', processaFormLogin);
    document.getElementById('btn_salvar').addEventListener('click', salvaLogin);

    carregarCredenciaisSalvas();

    const btnLogin = document.getElementById('btn-login');
    btnLogin.disabled = true;
    carregarUsuarios(() => {
      btnLogin.disabled = false;
    });
  </script>
</body>

</html>
